# ExoMamba V1 — sanity overfit: verifica que el modelo HÍBRIDO (Mamba global +
# CNN local) puede aprender en absoluto.
# 64 ejemplos del split Tier 2, dropout=0, weight_decay=0, early stopping off,
# val=train. Si la arquitectura está sana, debe MEMORIZAR esos 64 ejemplos →
# val_auc → 1.0.
#
# Espejea configs/mamba_sanity_overfit.yaml en filosofía: lr alto + cosine,
# 120 epochs, fp16 off para descartar inestabilidad de mixed precision.
#
# PRERREQUISITOS:
#   - WSL2 + mamba-ssm instalado (igual que Mamba puro).
#   - data/splits/tier2_train_tics.csv generado (FASE 2 — preprocess local).
#   - data/processed/local/<tic>.pt poblado.
#   - LightCurveDataset extendido para leer local_dir (FASE 2 también).

experiment:
  name: "exomamba_v1_sanity_overfit"
  seed: 42
  output_dir: "experiments"

data:
  train_csv: "data/splits/tier2_train_tics.csv"
  val_csv: "data/splits/tier2_train_tics.csv"   # SÍ, val = train (verificar memorización)
  processed_dir: "data/processed/global"
  local_dir: "data/processed/local"
  batch_size: 16
  num_workers: 0
  subset: 64

model:
  type: "exomamba_v1"
  params:
    # Mamba encoder (igual que mamba_sanity_overfit)
    in_channels: 1
    d_model: 64
    d_state: 16
    d_conv: 4
    expand: 2
    n_layers: 4
    mamba_dropout: 0.0
    standardize: true
    # CNN local
    local_channels: [16, 32, 64]
    local_kernel: 5
    local_dropout: 0.0
    # Cabeza
    head_hidden: 64
    head_dropout: 0.0

training:
  optimizer:
    type: "adamw"
    lr: 3.0e-3            # LR alto al principio; cosine lo baja al final
    weight_decay: 0.0
  scheduler:
    type: "cosine"
    t_max: 120
    eta_min: 1.0e-6
  loss:
    type: "bce"
    pos_weight: null      # sanity overfit lo más simple posible (sin pesos de clase)
  epochs: 120
  fp16: false             # SANITY: FP32 para descartar inestabilidad de mixed precision
  gradient_checkpointing: false
  grad_clip: 1.0          # CRÍTICO para Mamba: previene NaN en secuencias largas

early_stopping:
  enabled: false

logging:
  tensorboard: true
  log_every_n_steps: 5
