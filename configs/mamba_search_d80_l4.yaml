# Búsqueda de hiperparámetros: Mamba con d_model=80 (vs locked d_model=64).
# Resto idéntico a mamba_small.yaml para aislar el efecto de d_model.

experiment:
  name: "mamba_search_d80_l4"
  seed: 42
  output_dir: "experiments"

data:
  train_csv: "data/splits/train_tics.csv"
  val_csv: "data/splits/val_tics.csv"
  processed_dir: "data/processed/global"
  batch_size: 16
  num_workers: 2

model:
  type: "mamba_baseline"
  params:
    in_channels: 1
    d_model: 80
    d_state: 16
    d_conv: 4
    expand: 2
    n_layers: 4
    dropout: 0.1
    standardize: true

training:
  optimizer:
    type: "adamw"
    lr: 1.5e-3
    weight_decay: 1.0e-4
  scheduler:
    type: "cosine"
    t_max: 50
    eta_min: 1.0e-6
  loss:
    type: "bce"
    pos_weight: "balanced"
  epochs: 50
  fp16: false
  gradient_checkpointing: false
  grad_clip: 1.0

early_stopping:
  enabled: true
  metric: "val_auc"
  patience: 10
  mode: "max"

logging:
  tensorboard: true
  log_every_n_steps: 10
