# CNN 1D baseline (AstroNet-inspired) sobre vista global.
# Cumple el escalón "CNN baseline" de la escalera de Tier 1.

experiment:
  name: "cnn_baseline"
  seed: 42
  output_dir: "experiments"

data:
  train_csv: "data/splits/train_tics.csv"
  val_csv: "data/splits/val_tics.csv"
  processed_dir: "data/processed/global"
  batch_size: 16
  num_workers: 2

model:
  type: "cnn_baseline"
  params:
    in_channels: 1
    channels: [16, 32, 64, 128]
    kernel_size: 5
    hidden_dim: 64
    dropout: 0.1         # v3: bajamos de 0.3 (early stopping cuida overfit)
    standardize: true    # v2: estandarización por muestra (amplifica señal)
    norm: "batch"        # v2: revertimos a BatchNorm (v1 con GroupNorm fue peor que v0)

training:
  optimizer:
    type: "adam"
    lr: 5.0e-4           # v4: bajado de 1e-3 (v3 oscilaba mucho en val_auc)
    weight_decay: 1.0e-5
  scheduler:
    type: "cosine"
    t_max: 50
    eta_min: 1.0e-7
  loss:
    type: "bce"
    pos_weight: "balanced"
  epochs: 50
  fp16: false
  gradient_checkpointing: false

early_stopping:
  enabled: true
  metric: "val_auc"
  patience: 10
  mode: "max"

logging:
  tensorboard: true
  log_every_n_steps: 10
