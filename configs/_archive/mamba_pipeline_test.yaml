# Mamba — pipeline test (2 epochs sobre data real).
#
# Propósito: validar end-to-end ANTES del run real de 1-2h. Tres cosas:
#   1. El loader anda con full data (1103 train + 236 val).
#   2. FP16 + grad_clip no produce NaN sobre secuencias reales.
#   3. No hay OOM con batch=16 + d_model=64.
#
# Espejo de mamba_small.yaml excepto: epochs=2, fp16=true, scheduler=none,
# early stopping off. val_auc puede ser cualquier cosa (2 epochs es ruido).
# Lo único que mirás: que NO truene y que train_loss/val_loss sean finitos.
#
# Esperado: ~5-10 min en RTX 3050.

experiment:
  name: "mamba_pipeline_test"
  seed: 42
  output_dir: "experiments"

data:
  train_csv: "data/splits/train_tics.csv"
  val_csv: "data/splits/val_tics.csv"
  processed_dir: "data/processed/global"
  batch_size: 16
  num_workers: 2

model:
  type: "mamba_baseline"
  params:
    in_channels: 1
    d_model: 64
    d_state: 16
    d_conv: 4
    expand: 2
    n_layers: 4
    dropout: 0.1
    standardize: true

training:
  optimizer:
    type: "adamw"
    lr: 1.5e-3            # mismo que mamba_small
    weight_decay: 1.0e-4  # mismo que mamba_small
  scheduler:
    type: "none"          # 2 epochs no aprovechan cosine
  loss:
    type: "bce"
    pos_weight: "balanced"
  epochs: 2
  fp16: true              # CRÍTICO: validar FP16 sobre data real
  gradient_checkpointing: false
  grad_clip: 1.0

early_stopping:
  enabled: false

logging:
  tensorboard: true
  log_every_n_steps: 10
