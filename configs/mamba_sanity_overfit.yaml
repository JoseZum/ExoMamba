# Mamba — sanity overfit: verifica que el modelo PUEDE aprender en absoluto.
# 64 ejemplos, dropout=0, weight_decay=0, early stopping off, val=train.
# Si Mamba está sano, debe MEMORIZAR esos 64 ejemplos → val_auc → 1.0.
#
# HISTORIA:
#   - v1 (60 ep, sin scheduler): peak val_auc=0.96, rebote al final → no consolidaba en 1.0.
#   - v2 (120 ep, cosine scheduler 3e-3 → 1e-6): objetivo 1.0 con LR decay al final.
#
# Tiempo esperado: ~12-15 min en RTX 3050.

experiment:
  name: "mamba_sanity_overfit"
  seed: 42
  output_dir: "experiments"

data:
  train_csv: "data/splits/train_tics.csv"
  val_csv: "data/splits/train_tics.csv"   # SÍ, val = train (verificar memorización)
  processed_dir: "data/processed/global"
  batch_size: 16
  num_workers: 0
  subset: 64

model:
  type: "mamba_baseline"
  params:
    in_channels: 1
    d_model: 64
    d_state: 16
    d_conv: 4
    expand: 2
    n_layers: 4
    dropout: 0.0
    standardize: true

training:
  optimizer:
    type: "adamw"
    lr: 3.0e-3            # LR alto al principio para escapar warm-up; cosine lo baja al final
    weight_decay: 0.0
  scheduler:
    type: "cosine"        # crítico para llegar a 1.0: decae LR de 3e-3 → 1e-6 a lo largo del run
    t_max: 120            # cubre todo el run
    eta_min: 1.0e-6       # LR final bajo permite que el modelo se asiente fino
  loss:
    type: "bce"
    pos_weight: null   # sanity overfit lo más simple posible (sin pesos de clase)
  epochs: 120           # más epochs para llegar a 1.0 (con cosine, los últimos 30-40 son fine-tune)
  fp16: false           # SANITY: FP32 para descartar inestabilidad de mixed precision como culpable
  gradient_checkpointing: false
  grad_clip: 1.0        # CRÍTICO para Mamba: previene NaN en secuencias largas (más aún con FP16 en el run real)

early_stopping:
  enabled: false

logging:
  tensorboard: true
  log_every_n_steps: 5
